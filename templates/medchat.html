<!DOCTYPE html>
<html>
<head>
    <title>First Aid MedBot</title>

    <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>

    <style>
        .chatbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .doctor-img {
            width: 220px;
            margin-right: 20px;
        }

        .chat {
            max-width: 900px;
        }

        /* Typing animation */
        .typing {
            display: flex;
            align-items: center;
        }

        .typing span {
            height: 8px;
            width: 8px;
            margin: 0 2px;
            background-color: #555;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s infinite both;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        .msg_cotainer ul {
            padding-left: 20px;
        }

        .msg_cotainer strong {
            color: #2c7be5;
        }
    </style>
</head>

<body>
<div class="container-fluid h-100">
    <div class="row justify-content-center h-100 chatbox-wrapper">

        <!-- LEFT IMAGE -->
        <div>
            <img src="{{ url_for('static', filename='images/docimg.png') }}" class="doctor-img">
        </div>

        <!-- CHATBOX -->
        <div class="col-md-10 col-xl-8 chat">
            <div class="card">

                <!-- HEADER -->
                <div class="card-header msg_head">
                    <div class="d-flex bd-highlight">
                        <div class="img_cont">
                            <img src="{{ url_for('static', filename='images/medbot.jpg') }}" class="rounded-circle user_img">
                            <span class="online_icon"></span>
                        </div>

                        <div class="user_info">
                            <span>First Aid MedBot</span>
                            <p>Your personal Medical Assistant!</p>
                        </div>
                    </div>
                </div>

                <!-- CHAT BODY -->
                <div id="messageFormeight" class="card-body msg_card_body"></div>

                <!-- INPUT -->
                <div class="card-footer">
                    <form id="messageArea" class="input-group">
                        <input type="text" id="text" name="msg" placeholder="Type your message..."
                               autocomplete="off" class="form-control type_msg" required/>
                        <div class="input-group-append">
                            <button type="submit" id="send" class="input-group-text send_btn">
                                <i class="fas fa-location-arrow"></i>
                            </button>
                        </div>
                    </form>
					<div class="mt-2 alert alert-warning p-2" style="font-size: 12px;">
    ⚠️ This assistant uses limited medical data and does not provide diagnoses. 
    Seek professional medical help for serious conditions.
</div>
                </div>

            </div>
        </div>

    </div>
</div>

<script>
    marked.setOptions({ breaks: true });

    $(document).ready(function () {
        $("#messageArea").on("submit", function (event) {

            event.preventDefault();

            const date = new Date();
            const str_time = date.getHours() + ":" + date.getMinutes();

            var rawText = $("#text").val();

            var userHtml = '<div class="d-flex justify-content-end mb-4">' +
                '<div class="msg_cotainer_send">' + rawText +
                '<span class="msg_time_send">' + str_time + '</span></div>' +
                '<div class="img_cont_msg">' +
                '<img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg">' +
                '</div></div>';

            $("#text").val("");
            $("#messageFormeight").append(userHtml);

            // ✅ ADD TYPING ANIMATION
            var typingHtml = '<div id="typing" class="d-flex justify-content-start mb-4">' +
                '<div class="img_cont_msg">' +
                '<img src="{{ url_for('static', filename='images/medbot.jpg') }}" class="rounded-circle user_img_msg">' +
                '</div>' +
                '<div class="msg_cotainer typing">' +
                '<span></span><span></span><span></span>' +
                '</div></div>';

            $("#messageFormeight").append(typingHtml);

            $.ajax({
                data: {msg: rawText},
                type: "POST",
                url: "/get",
            }).done(function (data) {

                // ❌ REMOVE TYPING ANIMATION
                $("#typing").remove();

                var formattedText = marked.parse(data);

                var botHtml = '<div class="d-flex justify-content-start mb-4">' +
                    '<div class="img_cont_msg">' +
                    '<img src="{{ url_for('static', filename='images/medbot.jpg') }}" class="rounded-circle user_img_msg">' +
                    '</div>' +
                    '<div class="msg_cotainer">' + formattedText +
                    '<span class="msg_time">' + str_time + '</span></div></div>';

                $("#messageFormeight").append(botHtml);

                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
            });
        });
    });
</script>

</body>
</html>
